worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ─── PERFORMANCE ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ─── GZIP COMPRESSION ─────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── SECURITY HEADERS ─────────────────────────────────────
    # Hide nginx version
    server_tokens off;

    # ─── UPSTREAM BACKEND ──────────────────────────────────────
    upstream foodbliss_api {
        server 127.0.0.1:5000;
    }

    # ─── MAIN SERVER ──────────────────────────────────────────
    server {
        listen       80;
        server_name  localhost;

        # ── React Frontend (Static Files) ──────────────────
        # IMPORTANT: Change this path to your actual dist folder
        root  "E:/2026/food bliss attempt 2/dist";
        index index.html;

        # SPA fallback — any non-file, non-api route serves index.html
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API Reverse Proxy ──────────────────────────────
        location /api/ {
            proxy_pass http://foodbliss_api;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed later)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # CORS — handled by Express, but ensure preflight works
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $http_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
                add_header 'Access-Control-Max-Age'       86400;
                add_header 'Content-Length'                0;
                return 204;
            }
        }

        # ── Security — Block dotfiles ──────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }

        # ── Custom Error Pages ─────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}
